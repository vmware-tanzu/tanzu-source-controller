version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
- package-ecosystem: gomod
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    k8s-dependencies:
      patterns:
      - "k8s.io*"
  ignore:
  - dependency-name: "carvel.dev/imgpkg"
    versions: [">=0.100.0"]

